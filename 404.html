<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — NiceCream</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-deep:#1E4A96;
    --cream:#FFF9F0;
    --tan:#EDA85E;
    --navy-text:#122A54;
    --white:#ffffff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Nunito Sans', sans-serif;
    background:var(--blue-deep);
    color:var(--white);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
  }
  .box{ max-width:440px; }
  .cone{
    width:120px; height:120px;
    margin:0 auto 24px;
    background:var(--white);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:3.2rem;
  }
  h1{
    font-family:'Fredoka', sans-serif;
    font-size:2.4rem;
    margin-bottom:12px;
  }
  p{
    font-size:1rem;
    color:rgba(255,255,255,0.8);
    margin-bottom:28px;
    line-height:1.5;
  }
  a.btn{
    display:inline-block;
    background:var(--tan);
    color:var(--navy-text);
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    padding:14px 30px;
    border-radius:999px;
    text-decoration:none;
    transition:transform .15s ease;
  }
  a.btn:hover{ transform:translateY(-2px); }
</style>
</head>
<body>
  <div class="box">
    <div class="cone">🍦</div>
    <h1>Se derritió esta página</h1>
    <p>No encontramos lo que buscabas — puede que el link esté roto o la página ya no exista. Pero tenemos muchos sabores esperándote.</p>
    <a class="btn" href="/NiceCream/">Volver al inicio</a>
  </div>
</body>
</html>
